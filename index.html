<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Card Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card-container">

        <div class="card">
            <img src="image.png" alt="HTML">
            <h2>HTML</h2>
            <p>HTML is used to create the structure of web pages.</p>
            <button>Learn More</button>
        </div>

        <div class="card">
            <img src="image1.png" alt="CSS">
            <h2>CSS</h2>
            <p>CSS is used to style and design web pages.</p>
            <button>Learn More</button>
        </div>

        <div class="card">
            <img src="image2.png" alt="JavaScript">
            <h2>JavaScript</h2>
            <p>JavaScript adds interactivity and dynamic behavior.</p>
            <button>Learn More</button>
        </div>

        <div class="card">
            <img src="image3.png" alt="React">
            <h2>React</h2>
            <p>React is a popular JavaScript library for building UIs.</p>
            <button>Learn More</button>
        </div>

    </div>

</body>
</html>
